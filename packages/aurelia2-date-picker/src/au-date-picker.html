<template>
  <style>
    .au-dp {
      position: relative;
      display: inline-grid;
      gap: 0.35rem;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .au-dp-input {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      font: inherit;
    }

    .au-dp-panel {
      position: absolute;
      top: calc(100% + 0.3rem);
      left: 0;
      z-index: 60;
      width: 19rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
      padding: 0.75rem;
    }

    .au-dp-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .au-dp-title {
      text-align: center;
      font-weight: 700;
    }

    .au-dp-nav,
    .au-dp-day {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .au-dp-nav {
      padding: 0.35rem 0.55rem;
      border: 1px solid #cbd5e1;
    }

    .au-dp-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0.25rem;
    }

    .au-dp-weekday {
      color: #64748b;
      font-size: 0.78rem;
      text-align: center;
      font-weight: 650;
    }

    .au-dp-day {
      aspect-ratio: 1;
    }

    .au-dp-day.outside {
      color: #94a3b8;
    }

    .au-dp-day.today {
      box-shadow: inset 0 0 0 1px #2563eb;
    }

    .au-dp-day.selected {
      background: #2563eb;
      color: #fff;
    }

    .au-dp-day:disabled {
      color: #cbd5e1;
      cursor: not-allowed;
    }
  </style>

  <div class="au-dp">
    <input
      class="au-dp-input"
      value.bind="displayValue"
      placeholder.bind="placeholder"
      disabled.bind="disabled"
      readonly
      focus.trigger="openPicker()"
      click.trigger="openPicker()"
      keydown.trigger="onInputKeydown($event)"
    >

    <section if.bind="open" class="au-dp-panel" role="dialog" aria-label="Choose date">
      <div class="au-dp-header">
        <button type="button" class="au-dp-nav prev" click.trigger="previousMonth()" aria-label="Previous month">‹</button>
        <div class="au-dp-title">${month.label}</div>
        <button type="button" class="au-dp-nav next" click.trigger="nextMonth()" aria-label="Next month">›</button>
      </div>

      <div class="au-dp-grid">
        <div repeat.for="weekday of month.weekdays" class="au-dp-weekday">${weekday}</div>
        <button
          repeat.for="day of month.days"
          type="button"
          class.bind="dayClass(day)"
          disabled.bind="day.disabled"
          aria-pressed.bind="day.selected"
          click.trigger="select(day)"
        >
          ${day.label}
        </button>
      </div>
    </section>
  </div>
</template>
