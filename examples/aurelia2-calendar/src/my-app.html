<template>

    my-app {
      display: block;
      padding: 1.5rem;
      max-width: 72rem;
      margin: 0 auto;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #0f172a;
    }

    .page-header {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 1rem;
    }

    .page-header h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .page-header p {
      margin: 0;
      color: #475569;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 18rem;
      gap: 1rem;
      align-items: start;
    }

    .panel {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.85rem;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .panel h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
    }

    .panel code {
      background: #f1f5f9;
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
      font-size: 0.85em;
    }

    .log-entry {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px dashed #e2e8f0;
      margin-bottom: 0.5rem;
      min-height: 3.25rem;
    }

    .log-entry .label {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .log-entry .meta {
      color: #475569;
      font-size: 0.85rem;
    }

    .cv-day.is-holiday {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .cv-day.is-highlight {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(37, 99, 235, 0.5);
    }

    @media (max-width: 980px) {

        grid-template-columns: minmax(0, 1fr);

  <header class="page-header">
    <h1>Aurelia 2 Calendar</h1>
    <p>
      A simple month calendar powered by <code>aurelia2-calendar</code>. Click a day or an item to see emitted details.
    </p>
  </header>

  <div class="layout">
    <section class="panel">
      <au-calendar
        show-date.bind="showDate"
        items.bind="items"
        date-classes.bind="dateClasses"
        locale="en-us"
        show-times.bind="true"
        on-date-click.bind="(detail) => onDateClick(detail)"
        on-item-click.bind="(detail) => onItemClick(detail)"

      <h2>Last Day Click</h2>
      <div class="log-entry">
        <span class="label" if.bind="lastDateClick">${lastDateClick.label}</span>

      <div class="log-entry">

        <span class="meta" if.bind="lastItemClick">
          Range: ${lastItemClick.itemTitles.join(' → ')}
        </span>
        <span class="meta" else>Click an item to inspect the detail payload.</span>
